version: 2

updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'daily'
          time: '06:00'
          timezone: 'America/Toronto'
      open-pull-requests-limit: 10
      rebase-strategy: 'auto'

      groups:
          production-deps:
              dependency-type: 'production'
              update-types: ['minor', 'patch']
          dev-deps:
              dependency-type: 'development'
              update-types: ['minor', 'patch']

      ignore:
          # TypeScript 7 is the native Go port and does not expose the JS
          # compiler API the toolchain needs; the project pins v6 on purpose.
          # Never propose a major bump.
          - dependency-name: 'typescript'
            update-types: ['version-update:semver-major']

      commit-message:
          prefix: '⬆️'
          include: scope

      labels:
          - 'dependencies'
          - 'npm'
